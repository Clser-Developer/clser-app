
<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#fafafa" />
    <meta name="description" content="Plataforma de comunidade e experiencias exclusivas entre artistas e fas." />
    <title>Clser</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      html {
        height: 100%;
      }
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        min-height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        background-color: #f3f4f6; /* Light gray body bg */
      }
      
      #root {
        width: 100%;
        max-width: 450px;
        aspect-ratio: 1179 / 2556;
        max-height: 95vh;
        background-color: #FAFAFA; /* App background - Off White */
        border-radius: 2.5rem;
        border: 8px solid #111827; /* Dark bezel remains for phone look */
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        position: relative;
        overflow-y: auto;
        /* Crucial fix: Creates a new containing block for fixed children */
        transform: translateZ(0);
      }

      /* Hide scrollbar globally for all elements */
      * {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      *::-webkit-scrollbar {
        display: none;
      }

      /* Global Animations */
      @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
      @keyframes scale-in { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
      @keyframes scale-in-bounce {
        0% { transform: scale(0.5); opacity: 0; }
        60% { transform: scale(1.05); opacity: 1; }
        100% { transform: scale(1); opacity: 1; }
      }
      @keyframes draw-check { from { stroke-dashoffset: 32; } to { stroke-dashoffset: 0; } }
      @keyframes slide-up { from { transform: translateY(100%); } to { transform: translateY(0); } }

      /* Animation Utility Classes */
      .animate-fade-in { animation: fadeIn 0.3s ease-in-out forwards; }
      .animate-scale-in { animation: scale-in 0.3s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
      .animate-scale-in-bounce { animation: scale-in-bounce 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
      .animate-draw-check {
        stroke-dasharray: 32;
        stroke-dashoffset: 32;
        animation: draw-check 0.3s 0.4s ease-out forwards;
      }
      .animate-slide-up { animation: slide-up 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

      /* Custom Utilities */
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
  </head>
  <body class="bg-gray-100">
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
